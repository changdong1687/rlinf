# Self-contained DreamZero-5B actor.model config for the standalone LIBERO eval
# server (examples/embodiment/dreamzero_libero_eval/policy_server.py).
#
# This is a *snapshot* that merges:
#   - examples/embodiment/config/model/dreamzero_5b.yaml      (architecture)
#   - examples/embodiment/config/libero_spatial_eval_dreamzero.yaml  (libero eval overrides)
# with every Hydra ``${actor.model.*}`` interpolation already resolved to a literal,
# so it can be loaded standalone with ``OmegaConf.load`` (no Hydra defaults / no root
# interpolation needed).
#
# IMPORTANT: if examples/embodiment/config/model/dreamzero_5b.yaml changes upstream,
# this file must be re-synced by hand.
#
# Pretrained component paths resolve from the HuggingFace cache (or set absolute paths
# via policy_server.py CLI flags). ``metadata_json_path`` MUST point to the same
# metadata.json used during SFT (q99 normalization stats); override it on the CLI.

actor:
  model:
    model_type: "dreamzero"

    # Eval runs in bf16 (mixed precision); component weights are loaded then cast.
    precision: bf16

    # No full DreamZero safetensors dir: build from component weights below and then
    # overlay the trained checkpoint via policy_server.py --ckpt-path.
    model_path: null

    tokenizer_path: google/umt5-xxl
    diffusion_model_pretrained_path: Wan-AI/Wan2.2-TI2V-5B
    image_encoder_pretrained_path: Wan-AI/Wan2.1-I2V-14B-480P/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth
    text_encoder_pretrained_path: Wan-AI/Wan2.2-TI2V-5B/models_t5_umt5-xxl-enc-bf16.pth
    vae_pretrained_path: Wan-AI/Wan2.2-TI2V-5B/Wan2.2_VAE.pth

    # Override on the CLI: --metadata-json-path /path/to/metadata.json
    metadata_json_path: /path/to/metadata.json

    embodiment_tag: "libero_sim"
    is_lora: False

    action_dim: 32
    state_horizon: 1
    action_horizon: 16
    num_action_chunks: 16
    num_action_per_block: 16

    max_action_dim: 32
    max_state_dim: 64

    target_video_height: 160
    target_video_width: 320

    relative_action: False
    relative_action_per_horizon: False

    architectures:
      - VLA

    backbone_cfg:
      _target_: groot.vla.model.dreamzero.backbone.identity.IdentityBackbone

    action_head_cfg:
      _convert_: object
      _target_: groot.vla.model.dreamzero.action_head.wan_flow_matching_action_tf.WANPolicyHead
      config:
        _recursive_: false
        _target_: groot.vla.model.dreamzero.action_head.wan_flow_matching_action_tf.WANPolicyHeadConfig
        action_dim: 32
        action_horizon: 16
        skip_component_loading: true
        action_loss_embodiment_ids:
          - 26
          - 17
        add_pos_embed: true
        backbone_embedding_dim: 0
        backbone_features_projector_cfg: null
        decouple_inference_noise: false
        decouple_video_action_noise: false
        diffusion_model_cfg:
          _convert_: object
          _target_: groot.vla.model.dreamzero.modules.wan_video_dit_action_casual_chunk.CausalWanModel
          diffusion_model_pretrained_path: Wan-AI/Wan2.2-TI2V-5B
          dim: 3072
          eps: 1.0e-06
          ffn_dim: 14336
          frame_seqlen: 50
          freq_dim: 256
          in_dim: 48
          max_chunk_size: 4
          model_type: ti2v
          num_action_per_block: 16
          num_frame_per_block: 2
          num_heads: 24
          num_layers: 30
          num_state_per_block: 1
          out_dim: 48
          concat_first_frame_latent: false
        expand_batch: null
        freeze_decode_layer: false
        hidden_size: 64
        high_noise_beta_alpha: 3.0
        image_encoder_cfg:
          _convert_: object
          _target_: groot.vla.model.dreamzero.modules.wan_video_image_encoder.WanImageEncoder
          image_encoder_pretrained_path: Wan-AI/Wan2.1-I2V-14B-480P/models_clip_open-clip-xlm-roberta-large-vit-huge-14.pth
        init_lora_weights: kaiming
        input_embedding_dim: 1536
        load_pretrained_det_decode_layer_path: null
        lora_alpha: 4
        lora_rank: 4
        lora_target_modules: q,k,v,o,ffn.0,ffn.2
        max_action_dim: 32
        max_state_dim: 64
        model_dtype: float32
        noise_beta_alpha: 1.5
        noise_beta_beta: 1.0
        noise_s: 0.999
        num_frame_per_block: 2
        num_frames: 33
        num_inference_timesteps: 4
        num_timestep_buckets: 1000
        repa_coeff: 1.0
        repa_layer: 8
        text_encoder_cfg:
          _convert_: object
          _target_: groot.vla.model.dreamzero.modules.wan_video_text_encoder.WanTextEncoder
          text_encoder_pretrained_path: Wan-AI/Wan2.2-TI2V-5B/models_t5_umt5-xxl-enc-bf16.pth
        target_video_height: 160
        target_video_width: 320
        tile_size_height: 34
        tile_size_width: 34
        tile_stride_height: 18
        tile_stride_width: 16
        tiled: false
        train_architecture: full
        tune_diffusion_model: true
        tune_projector: true
        use_gradient_checkpointing: true
        use_high_noise_emphasis: false
        use_vlln: true
        vae_cfg:
          _convert_: object
          _target_: groot.vla.model.dreamzero.modules.wan_video_vae.WanVideoVAE38
          vae_pretrained_path: Wan-AI/Wan2.2-TI2V-5B/Wan2.2_VAE.pth
          z_dim: 48
          dim: 160
        video_inference_final_noise: 0.8
        video_noise_beta_alpha: 3.0
        video_noise_beta_beta: 1.0
        vl_self_attention_cfg:
          _target_: groot.vla.model.n1_5.modules.cross_attention_dit.SelfAttentionTransformer
          attention_head_dim: 64
          dropout: 0.2
          final_dropout: true
          num_attention_heads: 24
          num_layers: 4
          positional_embeddings: null
